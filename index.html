      function sydSearch(q) {

          var any = false;
          sec.querySelectorAll('.stop-card').forEach(function(card) {
            total++;

            var match = !q || hay.indexOf(q) >= 0;

            if (match) { any = true; visible++; }

            if (mv) {
              var el = sydMarkerEl(mv);

          });
